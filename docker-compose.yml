services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sdiary}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      TZ: Europe/Kyiv
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # web UI — open http://localhost:8025

  web:
    build: .
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-sdiary}
      REDIS_HOST: redis
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      # Route outgoing mail to MailHog (plain SMTP, no TLS, no auth)
      MAIL_SERVER: mailhog
      MAIL_PORT: "1025"
      MAIL_SSL_TLS: "false"
      MAIL_STARTTLS: "false"
      MAIL_USE_CREDENTIALS: "false"
      MAIL_VALIDATE_CERTS: "false"
    command: sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000"
    volumes:
      - uploads:/app/static/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      mailhog:
        condition: service_started

volumes:
  postgres-data:
  uploads:
